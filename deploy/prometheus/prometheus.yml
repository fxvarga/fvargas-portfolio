# Prometheus configuration for portfolio monitoring
# Low resource usage: longer scrape intervals, minimal retention
global:
  scrape_interval: 30s
  evaluation_interval: 30s
  scrape_timeout: 10s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Node Exporter — host-level metrics (CPU, RAM, disk, network)
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  # cAdvisor — container-level metrics (per-container CPU, RAM, network, I/O)
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
