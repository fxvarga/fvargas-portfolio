services:
  # Elasticsearch for search functionality
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: portfolio-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.name=portfolio-search
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - portfolio-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  backend:
    build:
      context: ./backend/dotnet
      dockerfile: Dockerfile
    container_name: portfolio-backend
    env_file:
      - deploy/.env
    volumes:
      # Persist SQLite database in a separate data directory
      - cms-data:/app/data
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - CMS_DB_PATH=/app/data/cms.db
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - portfolio-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/graphql?query=%7B__typename%7D"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Fernando Vargas portfolio (main site + admin)
  frontend-fernando:
    build:
      context: .
      dockerfile: frontend/portfolio-react/Dockerfile
    container_name: portfolio-frontend-fernando
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - portfolio-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Jessica Sutherland portfolio (photographer)
  frontend-jessica:
    build:
      context: .
      dockerfile: frontend/portfolio-jessica/Dockerfile
    container_name: portfolio-frontend-jessica
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - portfolio-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Busy Bee marketing agency portfolio
  frontend-busybee:
    build:
      context: .
      dockerfile: frontend/portfolio-busybee/Dockerfile
    container_name: portfolio-frontend-busybee
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - portfolio-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Executive Catering (1 Stop Wings + future executive catering site)
  frontend-executive-catering:
    build:
      context: ./frontend/portfolio-executive-catering
      dockerfile: Dockerfile
    container_name: portfolio-frontend-executive-catering
    networks:
      - portfolio-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/1stopwings-site/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # OpsBlueprint workflow automation consulting
  frontend-opsblueprint:
    build:
      context: .
      dockerfile: frontend/portfolio-opsblueprint/Dockerfile
    container_name: portfolio-frontend-opsblueprint
    networks:
      - portfolio-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Brad Earnhardt portfolio (UI/UX designer)
  frontend-brad:
    build:
      context: .
      dockerfile: frontend/portfolio-brad/Dockerfile
    container_name: portfolio-frontend-brad
    networks:
      - portfolio-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # ============================================
  # Plausible Analytics (self-hosted)
  # ============================================
  plausible_db:
    image: postgres:16-alpine
    container_name: portfolio-plausible-db
    restart: unless-stopped
    volumes:
      - plausible-db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=postgres
    networks:
      - portfolio-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  plausible_events_db:
    image: clickhouse/clickhouse-server:24.12-alpine
    container_name: portfolio-plausible-events-db
    restart: unless-stopped
    volumes:
      - plausible-events-data:/var/lib/clickhouse
      - plausible-events-logs:/var/log/clickhouse-server
      - ./deploy/clickhouse/logs.xml:/etc/clickhouse-server/config.d/logs.xml:ro
      - ./deploy/clickhouse/ipv4-only.xml:/etc/clickhouse-server/config.d/ipv4-only.xml:ro
      - ./deploy/clickhouse/low-resources.xml:/etc/clickhouse-server/config.d/low-resources.xml:ro
      - ./deploy/clickhouse/default-profile-low-resources-overrides.xml:/etc/clickhouse-server/users.d/default-profile-low-resources-overrides.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    environment:
      - CLICKHOUSE_SKIP_USER_SETUP=1
    networks:
      - portfolio-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 -O - http://127.0.0.1:8123/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  plausible:
    image: ghcr.io/plausible/community-edition:v3.2.0
    container_name: portfolio-plausible
    restart: unless-stopped
    command: sh -c "/entrypoint.sh db createdb && /entrypoint.sh db migrate && /entrypoint.sh run"
    depends_on:
      plausible_db:
        condition: service_healthy
      plausible_events_db:
        condition: service_healthy
    volumes:
      - plausible-data:/var/lib/plausible
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    environment:
      - TMPDIR=/var/lib/plausible/tmp
      - BASE_URL=${PLAUSIBLE_BASE_URL:-http://analytics.localhost:8000}
      - SECRET_KEY_BASE=${PLAUSIBLE_SECRET_KEY_BASE:-generate-me-with-openssl-rand-base64-48}
      - HTTP_PORT=8000
      - DISABLE_REGISTRATION=${PLAUSIBLE_DISABLE_REGISTRATION:-true}
    networks:
      - portfolio-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 -O - http://127.0.0.1:8000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ============================================
  # Monitoring Stack (Prometheus + Grafana)
  # ============================================
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: portfolio-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--storage.tsdb.retention.size=1GB"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - portfolio-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: portfolio-node-exporter
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    pid: host
    volumes:
      - /:/host:ro
    networks:
      - portfolio-network
    profiles:
      - linux
      - monitoring

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    container_name: portfolio-cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    command:
      - "--housekeeping_interval=30s"
      - "--docker_only=true"
      - "--disable_metrics=percpu,sched,tcp,udp,disk,diskIO,hugetlb,referenced_memory,cpu_topology,resctrl"
    networks:
      - portfolio-network

  grafana:
    image: grafana/grafana:10.4.0
    container_name: portfolio-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://${DOMAIN_GRAFANA:-grafana.localhost}
      - GF_SERVER_SERVE_FROM_SUB_PATH=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./deploy/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - portfolio-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ============================================
  # n8n Workflow Automation
  # ============================================
  n8n-postgres:
    image: postgres:16-alpine
    container_name: portfolio-n8n-postgres
    restart: unless-stopped
    env_file: ./deploy/.env
    environment:
      - POSTGRES_USER=${N8N_POSTGRES_USER:-n8n}
      - POSTGRES_PASSWORD=${N8N_POSTGRES_PASSWORD:-n8n}
      - POSTGRES_DB=${N8N_POSTGRES_DB:-n8n}
    volumes:
      - n8n-db-data:/var/lib/postgresql/data
    networks:
      - portfolio-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${N8N_POSTGRES_USER:-n8n}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  n8n:
    image: n8nio/n8n:latest
    container_name: portfolio-n8n
    restart: unless-stopped
    env_file: ./deploy/.env
    environment:
      # Force IPv4 — Docker bridge networks cannot route IPv6
      - NODE_OPTIONS=--dns-result-order=ipv4first
      # Database (docker-internal hostnames, not from .env)
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=n8n-postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${N8N_POSTGRES_DB:-n8n}
      - DB_POSTGRESDB_USER=${N8N_POSTGRES_USER:-n8n}
      - DB_POSTGRESDB_PASSWORD=${N8N_POSTGRES_PASSWORD:-n8n}
      # Execution — single mode (no Redis/worker needed)
      - EXECUTIONS_MODE=regular
      # Security
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_SECURE_COOKIE=false
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      # URLs — so n8n generates correct webhook URLs behind Caddy
      - WEBHOOK_URL=https://${DOMAIN_N8N:-n8n.localhost}/
      - N8N_EDITOR_BASE_URL=https://${DOMAIN_N8N:-n8n.localhost}/
      # Disable telemetry and unnecessary features to save resources
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false
      - N8N_INSIGHTS_ENABLED=false
      - N8N_LOG_LEVEL=info
      - GENERIC_TIMEZONE=America/New_York
    volumes:
      - n8n-data:/home/node/.n8n
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    depends_on:
      n8n-postgres:
        condition: service_healthy
    networks:
      - portfolio-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  n8n-python-helper:
    build: ./n8n-agent/python-helper
    container_name: portfolio-n8n-python-helper
    restart: unless-stopped
    networks:
      - portfolio-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Discord Bot (CMS agent interface)
  discord-bot:
    build:
      context: ./discord-bot
      dockerfile: Dockerfile
    container_name: portfolio-discord-bot
    ports:
      - "3100:3100"
    env_file:
      - deploy/.env
    environment:
      - CMS_API_URL=http://backend:5000/graphql
      - CMS_ADMIN_USERNAME=${CMS_ADMIN_USERNAME:-admin}
      - N8N_WEBHOOK_BASE_URL=http://n8n:5678/webhook
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - portfolio-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Caddy reverse proxy for multi-domain routing (local dev)
  caddy:
    image: caddy:2-alpine
    container_name: portfolio-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - DOMAIN_FERNANDO=${DOMAIN_FERNANDO:-localhost}
      - DOMAIN_BLOG=${DOMAIN_BLOG:-blog.localhost}
      - DOMAIN_JESSICA=${DOMAIN_JESSICA:-jessica.localhost}
      - DOMAIN_BUSYBEE=${DOMAIN_BUSYBEE:-busybee.localhost}
      - DOMAIN_1STOPWINGS=${DOMAIN_1STOPWINGS:-1stopwings.localhost}
      - DOMAIN_EXECUTIVE_CATERING=${DOMAIN_EXECUTIVE_CATERING:-executivecatering.localhost}
      - DOMAIN_OPSBLUEPRINT=${DOMAIN_OPSBLUEPRINT:-opsblueprint.localhost}
      - DOMAIN_BRAD=${DOMAIN_BRAD:-brad.localhost}
      - DOMAIN_ANALYTICS=${DOMAIN_ANALYTICS:-analytics.localhost}
      - DOMAIN_GRAFANA=${DOMAIN_GRAFANA:-grafana.localhost}
      - DOMAIN_N8N=${DOMAIN_N8N:-n8n.localhost}
      - DOMAIN_BOT=${DOMAIN_BOT:-bot.localhost}
    depends_on:
      frontend-fernando:
        condition: service_healthy
      frontend-jessica:
        condition: service_healthy
      frontend-busybee:
        condition: service_healthy
      frontend-executive-catering:
        condition: service_healthy
      frontend-opsblueprint:
        condition: service_healthy
      frontend-brad:
        condition: service_healthy
      backend:
        condition: service_healthy
      grafana:
        condition: service_healthy
    networks:
      - portfolio-network
    restart: unless-stopped

networks:
  portfolio-network:
    driver: bridge

volumes:
  elasticsearch-data:
    driver: local
  cms-data:
    driver: local
  caddy-data:
    driver: local
  caddy-config:
    driver: local
  plausible-db-data:
    driver: local
  plausible-events-data:
    driver: local
  plausible-events-logs:
    driver: local
  plausible-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  n8n-db-data:
    driver: local
  n8n-data:
    driver: local
