name: Deploy TinyToes PWA

on:
  push:
    branches: [main]
    paths:
      - "frontend/tinytoes-app/**"
      - ".github/workflows/deploy.yml"

jobs:
  deploy:
    name: Build & Deploy PWA to DigitalOcean
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ./frontend/tinytoes-app
        run: npm ci

      - name: Build PWA
        working-directory: ./frontend/tinytoes-app
        run: npx tsc -b && npx vite build

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push Docker image
        run: |
          docker build \
            -f frontend/tinytoes-app/Dockerfile \
            -t fxvarga/tinytoes-web:latest \
            frontend/tinytoes-app/
          docker push fxvarga/tinytoes-web:latest

      - name: Deploy to DigitalOcean
        env:
          DO_SSH_PRIVATE_KEY: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          DO_HOST: ${{ secrets.DO_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$DO_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${DO_HOST:-147.182.169.160}" >> ~/.ssh/known_hosts

          ssh -o StrictHostKeyChecking=no root@"${DO_HOST:-147.182.169.160}" \
            "cd /opt/portfolio && docker compose pull tinytoes-web && docker compose up -d tinytoes-web"
