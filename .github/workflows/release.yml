name: Release - Build & Deploy

on:
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deploy target'
        required: true
        type: choice
        options:
          - azure
          - none
        default: azure
  push:
    branches: [main]
    paths:
      - 'backend/dotnet/**'
      - 'frontend/portfolio-react/**'
      - 'frontend/portfolio-jessica/**'
      - 'frontend/portfolio-busybee/**'
      - 'frontend/portfolio-executive-catering/**'
      - 'frontend/portfolio-opsblueprint/**'
      - 'frontend/portfolio-brad/**'
      - 'frontend/portfolio-pinchos/**'
      - 'frontend/agent-chat-web/**'
      - 'frontend/tinytoes-app/**'
      - 'backend/dotnet/TinyToes.Api/**'
      - 'backend/dotnet/TinyToes.Infrastructure/**'
      - 'n8n-agent/python-helper/**'
      - 'services/voice-bridge/**'
      - 'deploy/**'
      - '.github/workflows/release.yml'

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: fxvarga

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: backend/dotnet
            dockerfile: backend/dotnet/Dockerfile
            image: portfolio-backend
          - service: frontend-fernando
            context: .
            dockerfile: frontend/portfolio-react/Dockerfile
            image: portfolio-frontend-fernando
          - service: frontend-jessica
            context: .
            dockerfile: frontend/portfolio-jessica/Dockerfile
            image: portfolio-frontend-jessica
          - service: frontend-busybee
            context: .
            dockerfile: frontend/portfolio-busybee/Dockerfile
            image: portfolio-frontend-busybee
          - service: frontend-executive-catering
            context: frontend/portfolio-executive-catering
            dockerfile: frontend/portfolio-executive-catering/Dockerfile
            image: portfolio-frontend-executive-catering
          - service: frontend-opsblueprint
            context: .
            dockerfile: frontend/portfolio-opsblueprint/Dockerfile
            image: portfolio-frontend-opsblueprint
          - service: frontend-brad
            context: .
            dockerfile: frontend/portfolio-brad/Dockerfile
            image: portfolio-frontend-brad
          - service: frontend-pinchos
            context: .
            dockerfile: frontend/portfolio-pinchos/Dockerfile
            image: portfolio-frontend-pinchos
          - service: n8n-python-helper
            context: n8n-agent/python-helper
            dockerfile: n8n-agent/python-helper/Dockerfile
            image: portfolio-n8n-python-helper
          - service: tinytoes-api
            context: backend/dotnet
            dockerfile: backend/dotnet/TinyToes.Api/Dockerfile
            image: tinytoes-api
          - service: tinytoes-web
            context: frontend/tinytoes-app
            dockerfile: frontend/tinytoes-app/Dockerfile
            image: tinytoes-web
          - service: hermes
            context: deploy/hermes
            dockerfile: deploy/hermes/Dockerfile
            image: portfolio-hermes
          - service: agentchat-web
            context: frontend/agent-chat-web
            dockerfile: frontend/agent-chat-web/Dockerfile
            image: agentchat-web
          - service: voice-bridge
            context: services/voice-bridge
            dockerfile: services/voice-bridge/Dockerfile
            image: portfolio-voice-bridge
          - service: caddy
            context: deploy/caddy
            dockerfile: deploy/caddy/Dockerfile
            image: portfolio-caddy
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          build-args: |
            VITE_APPLICATIONINSIGHTS_CONNECTION_STRING=${{ secrets.TINYTOES_APPLICATIONINSIGHTS_CONNECTION_STRING }}
            VITE_BASE_PATH=/

  deploy-azure:
    name: Deploy to Azure VM
    runs-on: ubuntu-latest
    needs: build
    if: |
      github.event.inputs.deploy_target == 'azure' || github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Render docker-compose.yml from template
        env:
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          CMS_ADMIN_PASSWORD: ${{ secrets.CMS_ADMIN_PASSWORD }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          PLAUSIBLE_SECRET_KEY_BASE: ${{ secrets.PLAUSIBLE_SECRET_KEY_BASE }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          N8N_DB_PASSWORD: ${{ secrets.N8N_DB_PASSWORD }}
          N8N_ENCRYPTION_KEY: ${{ secrets.N8N_ENCRYPTION_KEY }}
          MS_GRAPH_CLIENT_SECRET: ${{ secrets.MS_GRAPH_CLIENT_SECRET }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_API_KEY_SID: ${{ secrets.TWILIO_API_KEY_SID }}
          TWILIO_API_KEY_SECRET: ${{ secrets.TWILIO_API_KEY_SECRET }}
          TINYTOES_DB_PASSWORD: ${{ secrets.TINYTOES_DB_PASSWORD }}
          TINYTOES_STRIPE_SECRET_KEY: ${{ secrets.TINYTOES_STRIPE_SECRET_KEY }}
          TINYTOES_STRIPE_PRICE_ID: ${{ secrets.TINYTOES_STRIPE_PRICE_ID }}
          TINYTOES_STRIPE_WEBHOOK_SECRET: ${{ secrets.TINYTOES_STRIPE_WEBHOOK_SECRET }}
          TINYTOES_ADMIN_API_KEY: ${{ secrets.TINYTOES_ADMIN_API_KEY }}
          TINYTOES_MS_GRAPH_CLIENT_ID: ${{ secrets.TINYTOES_MS_GRAPH_CLIENT_ID }}
          TINYTOES_MS_GRAPH_CLIENT_SECRET: ${{ secrets.TINYTOES_MS_GRAPH_CLIENT_SECRET || secrets.MS_GRAPH_CLIENT_SECRET }}
          TINYTOES_MS_GRAPH_TENANT_ID: ${{ secrets.TINYTOES_MS_GRAPH_TENANT_ID }}
          TINYTOES_MAIL_USER_UPN: ${{ secrets.TINYTOES_MAIL_USER_UPN }}
          TINYTOES_AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.TINYTOES_AZURE_STORAGE_CONNECTION_STRING }}
          TINYTOES_AZURE_STORAGE_ACCOUNT_NAME: ${{ secrets.TINYTOES_AZURE_STORAGE_ACCOUNT_NAME }}
          TINYTOES_AZURE_STORAGE_ACCOUNT_KEY: ${{ secrets.TINYTOES_AZURE_STORAGE_ACCOUNT_KEY }}
          # Reuse the existing App Store Connect API key used by the iOS build/upload
          # workflow for App Store Server API transaction verification.
          TINYTOES_APPLE_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          TINYTOES_APPLE_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          TINYTOES_APPLE_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
          # TestFlight/Sandbox receipts require sandbox verification. Override to
          # false when validating production App Store purchases.
          TINYTOES_APPLE_USE_SANDBOX: ${{ secrets.TINYTOES_APPLE_USE_SANDBOX || 'true' }}
          TINYTOES_LULU_CLIENT_KEY: ${{ secrets.TINYTOES_LULU_CLIENT_KEY }}
          TINYTOES_LULU_CLIENT_SECRET: ${{ secrets.TINYTOES_LULU_CLIENT_SECRET }}
          TINYTOES_APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.TINYTOES_APPLICATIONINSIGHTS_CONNECTION_STRING }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALLOWED_USERS: ${{ secrets.TELEGRAM_ALLOWED_USERS }}
          GATEWAY_ALLOWED_USERS: ${{ secrets.GATEWAY_ALLOWED_USERS }}
          GMAIL_OAUTH_CLIENT_ID: ${{ secrets.GMAIL_OAUTH_CLIENT_ID }}
          GMAIL_OAUTH_CLIENT_SECRET: ${{ secrets.GMAIL_OAUTH_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          HERMES_API_KEY: ${{ secrets.HERMES_API_KEY }}
          HERMES_MODEL: ${{ secrets.HERMES_MODEL }}
          AZURE_SPEECH_KEY: ${{ secrets.AZURE_SPEECH_KEY }}
          AZURE_SPEECH_REGION: ${{ secrets.AZURE_SPEECH_REGION }}
          AZURE_SPEECH_VOICE: ${{ secrets.AZURE_SPEECH_VOICE }}
          AZURE_SPEECH_LANGUAGE: ${{ secrets.AZURE_SPEECH_LANGUAGE }}
          AUDIO_TOKEN_SECRET: ${{ secrets.AUDIO_TOKEN_SECRET }}
          GODADDY_API_TOKEN: ${{ secrets.GODADDY_API_TOKEN }}
          ENTRA_TENANT_ID: ${{ secrets.ENTRA_TENANT_ID }}
          ENTRA_CLIENT_ID: ${{ secrets.ENTRA_CLIENT_ID }}
          ENTRA_CLIENT_SECRET: ${{ secrets.ENTRA_CLIENT_SECRET }}
          OAUTH2_PROXY_COOKIE_SECRET: ${{ secrets.OAUTH2_PROXY_COOKIE_SECRET }}
          OAUTH2_PROXY_ALLOWED_OID: ${{ secrets.OAUTH2_PROXY_ALLOWED_OID }}
        run: |
          envsubst < deploy/docker-compose.yml.template > deploy/docker-compose.yml

      - name: Connect to Twingate
        uses: twingate/github-action@v1
        with:
          service-key: ${{ secrets.TWINGATE_SERVICE_KEY }}

      - name: Azure Login (for VM run-command)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Twingate connector is running
        run: |
          az vm run-command invoke \
            --resource-group rg-fev-fevargas \
            --name vm-fev-fevargas-prod-eastus2 \
            --command-id RunShellScript \
            --scripts "
              if docker inspect --format='{{.State.Running}}' twingate-connector 2>/dev/null | grep -q true; then
                echo 'Connector already running'
              else
                docker rm -f twingate-connector 2>/dev/null || true
                docker run -d --name twingate-connector --restart unless-stopped --network host \
                  -e TWINGATE_NETWORK=${{ secrets.TWINGATE_NETWORK }} \
                  -e TWINGATE_ACCESS_TOKEN=${{ secrets.TWINGATE_CONNECTOR_ACCESS_TOKEN }} \
                  -e TWINGATE_REFRESH_TOKEN=${{ secrets.TWINGATE_CONNECTOR_REFRESH_TOKEN }} \
                  -e TWINGATE_LABEL_HOSTNAME=vm-fev-prod \
                  twingate/connector:1
                sleep 15
                echo 'Connector recreated'
              fi
            "

      - name: Deploy to VM
        env:
          VM_SSH_PRIVATE_KEY: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          VM_HOST: ${{ secrets.VM_PRIVATE_IP }}
        run: |
          mkdir -p ~/.ssh
          echo "$VM_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VM_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Copy all deploy configs to VM
          scp -o StrictHostKeyChecking=no -r \
            deploy/docker-compose.yml \
            deploy/Caddyfile \
            deploy/Caddyfile.production \
            deploy/clickhouse \
            deploy/grafana \
            deploy/prometheus \
            deploy/hermes \
            azureuser@"$VM_HOST":/opt/portfolio/

          # Pull all images and restart everything
          ssh -o StrictHostKeyChecking=no azureuser@"$VM_HOST" << 'EOF'
            cd /opt/portfolio
            docker compose pull
            docker compose up -d
            # Fix backend permissions
            docker exec -u root portfolio-backend sh -c 'chown -R appuser:appuser /app/wwwroot/uploads' 2>/dev/null || true
            docker image prune -f
            echo "--- Running containers ---"
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" | head -30
          EOF

      - name: Print deploy summary
        run: |
          echo "### Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** Azure VM (${{ secrets.VM_PUBLIC_IP }})" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**All 9 services built and deployed**" >> $GITHUB_STEP_SUMMARY

