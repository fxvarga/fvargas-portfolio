name: Build iOS App

on:
  push:
    branches: [main]

jobs:
  ios-build:
    name: Build iOS App (Simulator)
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        working-directory: ./frontend/tinytoes-app
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Build PWA
        working-directory: ./frontend/tinytoes-app
        run: npx tsc -b && npx vite build

      - name: Sync web assets to iOS bundle
        run: |
          chmod +x ios/TinyToes/Scripts/sync-web-assets.sh
          ios/TinyToes/Scripts/sync-web-assets.sh

      - name: Build iOS app (Simulator)
        working-directory: ./ios/TinyToes
        run: |
          xcodebuild \
            -project TinyToes.xcodeproj \
            -scheme TinyToes \
            -configuration Release \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            build
