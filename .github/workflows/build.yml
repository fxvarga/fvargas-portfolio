name: Build iOS App

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

jobs:
  ios-build:
    name: Build iOS App (Simulator)
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ./frontend/tinytoes-app
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Build PWA
        working-directory: ./frontend/tinytoes-app
        run: npx tsc -b && npx vite build

      - name: Sync web assets to iOS bundle
        run: |
          chmod +x ios/TinyToes/Scripts/sync-web-assets.sh
          ios/TinyToes/Scripts/sync-web-assets.sh

      - name: Build iOS app (Simulator)
        working-directory: ./ios/TinyToes
        run: |
          xcodebuild \
            -project TinyToes.xcodeproj \
            -scheme TinyToes \
            -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            build

  # TestFlight archive & upload — runs only when signing secrets are configured
  testflight:
    name: Archive & Upload to TestFlight
    runs-on: macos-latest
    needs: ios-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    # Only run when Apple signing secrets exist
    env:
      HAS_SECRETS: ${{ secrets.APPLE_CERTIFICATE_P12 != '' }}

    steps:
      - name: Skip if secrets not configured
        if: env.HAS_SECRETS != 'true'
        run: echo "Apple signing secrets not configured yet — skipping TestFlight upload."

      - name: Checkout repository
        if: env.HAS_SECRETS == 'true'
        uses: actions/checkout@v4

      - name: Select Xcode 26
        if: env.HAS_SECRETS == 'true'
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Setup Node.js
        if: env.HAS_SECRETS == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        if: env.HAS_SECRETS == 'true'
        working-directory: ./frontend/tinytoes-app
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Build PWA
        if: env.HAS_SECRETS == 'true'
        working-directory: ./frontend/tinytoes-app
        run: npx tsc -b && npx vite build

      - name: Sync web assets to iOS bundle
        if: env.HAS_SECRETS == 'true'
        run: |
          chmod +x ios/TinyToes/Scripts/sync-web-assets.sh
          ios/TinyToes/Scripts/sync-web-assets.sh

      - name: Import signing certificate
        if: env.HAS_SECRETS == 'true'
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Import provisioning profile
        if: env.HAS_SECRETS == 'true'
        env:
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo "$APPLE_PROVISIONING_PROFILE" | base64 --decode > "$PP_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(security cms -D -i "$PP_PATH"))
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PP_UUID".mobileprovision
          echo "PP_UUID=$PP_UUID" >> $GITHUB_ENV

      - name: Archive for distribution
        if: env.HAS_SECRETS == 'true'
        working-directory: ./ios/TinyToes
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild \
            -project TinyToes.xcodeproj \
            -scheme TinyToes \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/TinyToes.xcarchive \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE="$PP_UUID" \
            archive

      - name: Export IPA
        if: env.HAS_SECRETS == 'true'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
        run: |
          mkdir -p ~/private_keys
          echo "$APPLE_API_PRIVATE_KEY" | base64 --decode > ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8

          cat > $RUNNER_TEMP/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>upload</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.tinytoes.app</key>
              <string>${PP_UUID}</string>
            </dict>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/TinyToes.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -authenticationKeyPath ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8 \
            -authenticationKeyID "$APPLE_API_KEY_ID" \
            -authenticationKeyIssuerID "$APPLE_API_ISSUER_ID"

      - name: Upload to TestFlight
        if: env.HAS_SECRETS == 'true'
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            -f $RUNNER_TEMP/export/TinyToes.ipa \
            -t ios \
            --apiKey "$APPLE_API_KEY_ID" \
            --apiIssuer "$APPLE_API_ISSUER_ID"

      - name: Clean up keychain
        if: always() && env.HAS_SECRETS == 'true'
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
