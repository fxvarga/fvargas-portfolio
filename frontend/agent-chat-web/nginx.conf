server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;

    # Handle SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy voice-bridge (Python FastAPI) — must come before generic /api/ block
    location /api/voice/ {
        proxy_pass http://voice-bridge:8080/api/voice/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Audio uploads can be a few MB
        client_max_body_size 25m;

        # Voice round-trip (STT + Hermes + TTS) can take 30s+
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering off;
    }

    # NOTE: .NET backend (agentchat-api) was removed; /api/voice/ is the only proxy.
    # If a new backend is added, register its location block above this comment
    # and BEFORE the generic /api/voice/ block to avoid prefix collisions.

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
