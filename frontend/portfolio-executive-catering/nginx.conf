# 1 Stop Wings site (1stopwings.localhost / 1stopwings domain)
server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html/1stopwings-site;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Shared assets (HTML references ../_shared/ which resolves to /_shared/)
    # ^~ ensures this takes priority over the regex static asset cache location
    location ^~ /_shared/ {
        alias /usr/share/nginx/html/_shared/;
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
}

