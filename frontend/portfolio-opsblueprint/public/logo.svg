<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Blueprint grid background -->
  <rect width="40" height="40" rx="8" fill="#2563EB"/>
  <!-- Gear/cog outer ring (operations) -->
  <circle cx="20" cy="20" r="11" stroke="white" stroke-width="2" stroke-dasharray="4 2.5" opacity="0.35"/>
  <!-- Central flow node -->
  <circle cx="20" cy="20" r="5" fill="white" opacity="0.9"/>
  <!-- Three directional arrows representing workflow automation -->
  <!-- Top arrow -->
  <path d="M20 8 L20 13" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <path d="M17.5 11 L20 8 L22.5 11" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bottom-left arrow -->
  <path d="M12.3 28.5 L15.8 24.5" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <path d="M11 26 L12.3 28.5 L14.8 27.2" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bottom-right arrow -->
  <path d="M27.7 28.5 L24.2 24.5" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <path d="M29 26 L27.7 28.5 L25.2 27.2" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Small accent dot in center -->
  <circle cx="20" cy="20" r="1.8" fill="#2563EB"/>
</svg>