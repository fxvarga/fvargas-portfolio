#cloud-config
package_update: true
package_upgrade: true

packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - jq
  - unzip
  - fail2ban
  - ufw

disk_setup:
  /dev/disk/azure/scsi1/lun0:
    table_type: gpt
    layout: true
    overwrite: false

fs_setup:
  - label: dockerdata
    filesystem: ext4
    device: /dev/disk/azure/scsi1/lun0
    partition: auto
    overwrite: false

mounts:
  - ["/dev/disk/azure/scsi1/lun0-part1", "/var/lib/docker", "ext4", "defaults,nofail,discard", "0", "2"]

runcmd:
  # Create mount point and mount data disk
  - mkdir -p /var/lib/docker

  # Add 4GB swap
  - fallocate -l 4G /swapfile
  - chmod 600 /swapfile
  - mkswap /swapfile
  - swapon /swapfile
  - echo '/swapfile none swap sw 0 0' >> /etc/fstab

  # Install Docker CE
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

  # Configure Docker daemon (log rotation, live-restore)
  - |
    cat > /etc/docker/daemon.json <<EOF
    {
      "log-driver": "json-file",
      "log-opts": {
        "max-size": "10m",
        "max-file": "3"
      },
      "live-restore": true,
      "storage-driver": "overlay2"
    }
    EOF
  - systemctl restart docker

  # Add admin user to docker group
  - usermod -aG docker azureuser

  # Install Azure CLI (for Key Vault access)
  - curl -sL https://aka.ms/InstallAzureCLIDeb | bash

  # Configure UFW
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 22/tcp
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable

  # Configure fail2ban
  - systemctl enable fail2ban
  - systemctl start fail2ban

  # Create portfolio directory
  - mkdir -p /opt/portfolio
  - chown azureuser:azureuser /opt/portfolio

  # Docker login from Key Vault (retry loop — MI may take a moment to propagate)
  - |
    for i in $(seq 1 12); do
      TOKEN=$(curl -s -H "Metadata: true" "http://169.254.169.254/metadata/identity/oauth2/token?api-version=2018-02-01&resource=https://vault.azure.net" | jq -r '.access_token // empty')
      if [ -n "$TOKEN" ]; then
        KV_NAME=$(curl -s -H "Metadata: true" "http://169.254.169.254/metadata/instance?api-version=2021-02-01" | jq -r '.compute.tagsList[] | select(.name=="keyVaultName") | .value // empty')
        if [ -n "$KV_NAME" ]; then
          PAT=$(curl -s -H "Authorization: Bearer $TOKEN" "https://${KV_NAME}.vault.azure.net/secrets/docker-hub-pat?api-version=7.4" | jq -r '.value // empty')
          if [ -n "$PAT" ]; then
            echo "$PAT" | docker login -u fxvarga --password-stdin
            break
          fi
        fi
      fi
      sleep 10
    done

final_message: "Cloud-init completed. Docker host ready at $(date)."
